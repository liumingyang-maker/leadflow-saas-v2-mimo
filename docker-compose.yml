services:
  web:
    build: .
    environment:
      - APP_ENV=development
      - SECRET_KEY=dev-only-change-me
      - DATABASE_URL=sqlite:////data/leadflow-v2.db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5000:5000"
    volumes:
      - leadflow_data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health/live', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  db:
    image: alpine:3.21.3
    command: ["sh", "-c", "mkdir -p /data && touch /data/leadflow-v2.db && tail -f /dev/null"]
    volumes:
      - leadflow_data:/data
    healthcheck:
      test: ["CMD", "test", "-f", "/data/leadflow-v2.db"]
      interval: 10s
      timeout: 3s
      retries: 3

  worker:
    build: .
    environment:
      - APP_ENV=development
      - SECRET_KEY=dev-only-change-me
      - DATABASE_URL=sqlite:////data/leadflow-v2.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - leadflow_data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: python run_worker.py default

volumes:
  leadflow_data:
  redis_data:
